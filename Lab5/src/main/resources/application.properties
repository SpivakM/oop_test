# === H2 Console (http://localhost:8080/h2-console) ===
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JPA / Hibernate ===
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=false

# === Initial Data ===
# Temporarily set to 'always' to load data.sql. Change back to 'never' after first run.
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# === Disable Spring Boot web server for console app ===
spring.main.web-application-type=none

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/logistics_db
spring.datasource.username=postgres
spring.datasource.password=cgsdfr2409
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
# 'update' automatically creates/updates database tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional: Show SQL queries in the console for debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false