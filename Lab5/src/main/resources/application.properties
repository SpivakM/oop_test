# === Application ===
spring.application.name=Logistics System

# === H2 Database ===
#spring.datasource.url=jdbc:h2:file:./data/logistics_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
