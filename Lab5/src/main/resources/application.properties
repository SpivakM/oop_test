# === Application ===
spring.application.name=Logistics System

# === H2 Database ===
spring.datasource.url=jdbc:h2:mem:logistics_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# === H2 Console (http://localhost:8080/h2-console) ===
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JPA / Hibernate ===
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# === Initial Data ===
# Завжди завантажувати data.sql для демо-сценарію
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# === Disable Spring Boot web server for console app ===
spring.main.web-application-type=none

